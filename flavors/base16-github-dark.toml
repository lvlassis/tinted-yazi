[mgr]
cwd = { fg = "#7ee787" }

find_keyword = { bold = true, fg = "#bb8009" }
find_position = { fg = "#ff7b72" }

marker_copied = { fg = "#a5d6ff", bg = "#a5d6ff" }
marker_cut = { fg = "#ffa657", bg = "#ffa657" }
marker_selected = { fg = "#bb8009", bg = "#bb8009" }

count_copied = { fg = "#0d1117", bg = "#a5d6ff" }
count_cut = { fg = "#0d1117", bg = "#ffa657" }
count_selected = { fg = "#0d1117", bg = "#bb8009" }

border_style = { fg = "#d2a8ff" }

[tabs]
active = { fg = "#0d1117", bg = "#d2a8ff"}
inactive = { fg = "#d2a8ff", bg = "#161b22" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }

[mode]
normal_main = { fg = "#0d1117", bg = "#d2a8ff", bold = true }
normal_alt = { fg = "#d2a8ff", bg = "#484f58" }

select_alt = { fg = "#ff7b72", bg = "#484f58" }
select_main = { fg = "#0d1117", bg = "#ff7b72", bold = true }

unset_main = { fg = "#0d1117", bg = "#ffa657", bold = true }
unset_alt = { fg = "#ffa657", bg = "#484f58" }

[status]
perm_exec = { fg = "#a5d6ff" }
perm_read = { fg = "#bb8009" }
perm_sep = { fg = "#7ee787" }
perm_type = { fg = "#d2a8ff" }
perm_write = { fg = "#ffa657" }

progress_error = { fg = "#ffa657", bg = "#0d1117" }
progress_label = { fg = "#c9d1d9", bg = "#0d1117" }
progress_normal = { fg = "#c9d1d9", bg = "#0d1117" }

[pick]
active = { fg = "#ff7b72" }
border = { fg = "#d2a8ff" }
inactive = { fg = "#c9d1d9" }

[task]
title = { fg = "#d2a8ff" }
border = { fg = "#d2a8ff" }
hovered = { fg = "#c9d1d9", bg = "#484f58" }

[input]
border = { fg = "#d2a8ff" }
selected = { bg = "#484f58" }

[help]
desc = { fg = "#c9d1d9" }
on = { fg = "#7ee787" }
run = { fg = "#ff7b72" }
hovered = { reversed = true, bold = true }
footer = { fg = "#484f58", bg = "#c9d1d9" }

[which]
mask = { bg = "#484f58" }
desc = { fg = "#c9d1d9" }
cand = { fg = "#7ee787" }
rest = { fg = "#ffa198" }

separator_style = { fg = "#8b949e" }

[notify]
title_info = { fg = "#7ee787" }
title_warn = { fg = "#bb8009" }
title_error = { fg = "#ffa657" }
 
[filetype]
rules = [
  { mime = "image/*", fg = "#7ee787" },
  { mime = "{audio, video}/*", fg = "#bb8009" },
   
  { mime = "application/{pdf,doc,rtf}", fg = "#a5d6ff" },
  
  { mime = "application/" },
  
  { url = "*/", fg = "#d2a8ff" },
  { mime = "*", fg = "#c9d1d9" },
]

[icon]
globs = []
dirs  = [
	{ name = ".config", text = "", fg = "#d2a8ff" },
	{ name = ".git", text = "", fg = "#d2a8ff" },
	{ name = ".github", text = "", fg = "#d2a8ff" },
	{ name = ".npm", text = "", fg = "#d2a8ff" },
	{ name = "Desktop", text = "", fg = "#d2a8ff" },
	{ name = "Development", text = "", fg = "#d2a8ff" },
	{ name = "Documents", text = "", fg = "#d2a8ff" },
	{ name = "Downloads", text = "", fg = "#d2a8ff" },
	{ name = "Library", text = "", fg = "#d2a8ff" },
	{ name = "Movies", text = "", fg = "#d2a8ff" },
	{ name = "Music", text = "", fg = "#d2a8ff" },
	{ name = "Pictures", text = "", fg = "#d2a8ff" },
	{ name = "Public", text = "", fg = "#d2a8ff" },
	{ name = "Videos", text = "", fg = "#d2a8ff" },
]
#files = [
#
#]
#exts = [
#
#]
conds = [
	# Fallback
	{ if = "dir & hovered", text = "", fg = "#d2a8ff" },
	{ if = "dir", text = "", fg = "#d2a8ff" },
	{ if = "exec", text = "", fg = "#a5d6ff" },
	{ if = "!dir", text = "", fg = "#f0f6fc" },
]
