[mgr]
cwd = { fg = "#83b7e5" }

find_keyword = { bold = true, fg = "#e0a557" }
find_position = { fg = "#c792ea" }

marker_copied = { fg = "#78c06e", bg = "#78c06e" }
marker_cut = { fg = "#6e98e1", bg = "#6e98e1" }
marker_selected = { fg = "#e0a557", bg = "#e0a557" }

count_copied = { fg = "#292d3e", bg = "#78c06e" }
count_cut = { fg = "#292d3e", bg = "#6e98e1" }
count_selected = { fg = "#292d3e", bg = "#e0a557" }

border_style = { fg = "#82aaff" }

[tabs]
active = { fg = "#292d3e", bg = "#82aaff"}
inactive = { fg = "#82aaff", bg = "#444267" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }

[mode]
normal_main = { fg = "#292d3e", bg = "#82aaff", bold = true }
normal_alt = { fg = "#82aaff", bg = "#5c598b" }

select_alt = { fg = "#c792ea", bg = "#5c598b" }
select_main = { fg = "#292d3e", bg = "#c792ea", bold = true }

unset_main = { fg = "#292d3e", bg = "#6e98e1", bold = true }
unset_alt = { fg = "#6e98e1", bg = "#5c598b" }

[status]
perm_exec = { fg = "#78c06e" }
perm_read = { fg = "#e0a557" }
perm_sep = { fg = "#83b7e5" }
perm_type = { fg = "#82aaff" }
perm_write = { fg = "#6e98e1" }

progress_error = { fg = "#6e98e1", bg = "#292d3e" }
progress_label = { fg = "#959dcb", bg = "#292d3e" }
progress_normal = { fg = "#959dcb", bg = "#292d3e" }

[pick]
active = { fg = "#c792ea" }
border = { fg = "#82aaff" }
inactive = { fg = "#959dcb" }

[task]
title = { fg = "#82aaff" }
border = { fg = "#82aaff" }
hovered = { fg = "#959dcb", bg = "#5c598b" }

[input]
border = { fg = "#82aaff" }
selected = { bg = "#5c598b" }

[help]
desc = { fg = "#959dcb" }
on = { fg = "#83b7e5" }
run = { fg = "#c792ea" }
hovered = { reversed = true, bold = true }
footer = { fg = "#5c598b", bg = "#959dcb" }

[which]
mask = { bg = "#5c598b" }
desc = { fg = "#959dcb" }
cand = { fg = "#83b7e5" }
rest = { fg = "#ff5370" }

separator_style = { fg = "#8796b0" }

[notify]
title_info = { fg = "#83b7e5" }
title_warn = { fg = "#e0a557" }
title_error = { fg = "#6e98e1" }
 
[filetype]
rules = [
  { mime = "image/*", fg = "#83b7e5" },
  { mime = "{audio, video}/*", fg = "#e0a557" },
   
  { mime = "application/{pdf,doc,rtf}", fg = "#78c06e" },
  
  { mime = "application/" },
  
  { url = "*/", fg = "#82aaff" },
  { mime = "*", fg = "#959dcb" },
]

[icon]
globs = []
dirs  = [
	{ name = ".config", text = "", fg = "#82aaff" },
	{ name = ".git", text = "", fg = "#82aaff" },
	{ name = ".github", text = "", fg = "#82aaff" },
	{ name = ".npm", text = "", fg = "#82aaff" },
	{ name = "Desktop", text = "", fg = "#82aaff" },
	{ name = "Development", text = "", fg = "#82aaff" },
	{ name = "Documents", text = "", fg = "#82aaff" },
	{ name = "Downloads", text = "", fg = "#82aaff" },
	{ name = "Library", text = "", fg = "#82aaff" },
	{ name = "Movies", text = "", fg = "#82aaff" },
	{ name = "Music", text = "", fg = "#82aaff" },
	{ name = "Pictures", text = "", fg = "#82aaff" },
	{ name = "Public", text = "", fg = "#82aaff" },
	{ name = "Videos", text = "", fg = "#82aaff" },
]
#files = [
#
#]
#exts = [
#
#]
conds = [
	# Fallback
	{ if = "dir & hovered", text = "", fg = "#82aaff" },
	{ if = "dir", text = "", fg = "#82aaff" },
	{ if = "exec", text = "", fg = "#78c06e" },
	{ if = "!dir", text = "", fg = "#959dcb" },
]
