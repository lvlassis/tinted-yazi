[mgr]
cwd = { fg = "#116329" }

find_keyword = { bold = true, fg = "#bf8700" }
find_position = { fg = "#cf222e" }

marker_copied = { fg = "#0a3069", bg = "#0a3069" }
marker_cut = { fg = "#953800", bg = "#953800" }
marker_selected = { fg = "#bf8700", bg = "#bf8700" }

count_copied = { fg = "#ffffff", bg = "#0a3069" }
count_cut = { fg = "#ffffff", bg = "#953800" }
count_selected = { fg = "#ffffff", bg = "#bf8700" }

border_style = { fg = "#8250df" }

[tabs]
active = { fg = "#ffffff", bg = "#8250df"}
inactive = { fg = "#8250df", bg = "#f6f8fa" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }

[mode]
normal_main = { fg = "#ffffff", bg = "#8250df", bold = true }
normal_alt = { fg = "#8250df", bg = "#afb8c1" }

select_alt = { fg = "#cf222e", bg = "#afb8c1" }
select_main = { fg = "#ffffff", bg = "#cf222e", bold = true }

unset_main = { fg = "#ffffff", bg = "#953800", bold = true }
unset_alt = { fg = "#953800", bg = "#afb8c1" }

[status]
perm_exec = { fg = "#0a3069" }
perm_read = { fg = "#bf8700" }
perm_sep = { fg = "#116329" }
perm_type = { fg = "#8250df" }
perm_write = { fg = "#953800" }

progress_error = { fg = "#953800", bg = "#ffffff" }
progress_label = { fg = "#424a53", bg = "#ffffff" }
progress_normal = { fg = "#424a53", bg = "#ffffff" }

[pick]
active = { fg = "#cf222e" }
border = { fg = "#8250df" }
inactive = { fg = "#424a53" }

[task]
title = { fg = "#8250df" }
border = { fg = "#8250df" }
hovered = { fg = "#424a53", bg = "#afb8c1" }

[input]
border = { fg = "#8250df" }
selected = { bg = "#afb8c1" }

[help]
desc = { fg = "#424a53" }
on = { fg = "#116329" }
run = { fg = "#cf222e" }
hovered = { reversed = true, bold = true }
footer = { fg = "#afb8c1", bg = "#424a53" }

[which]
mask = { bg = "#afb8c1" }
desc = { fg = "#424a53" }
cand = { fg = "#116329" }
rest = { fg = "#82071e" }

separator_style = { fg = "#6e7781" }

[notify]
title_info = { fg = "#116329" }
title_warn = { fg = "#bf8700" }
title_error = { fg = "#953800" }
 
[filetype]
rules = [
  { mime = "image/*", fg = "#116329" },
  { mime = "{audio, video}/*", fg = "#bf8700" },
   
  { mime = "application/{pdf,doc,rtf}", fg = "#0a3069" },
  
  { mime = "application/" },
  
  { url = "*/", fg = "#8250df" },
  { mime = "*", fg = "#424a53" },
]

[icon]
globs = []
dirs  = [
	{ name = ".config", text = "", fg = "#8250df" },
	{ name = ".git", text = "", fg = "#8250df" },
	{ name = ".github", text = "", fg = "#8250df" },
	{ name = ".npm", text = "", fg = "#8250df" },
	{ name = "Desktop", text = "", fg = "#8250df" },
	{ name = "Development", text = "", fg = "#8250df" },
	{ name = "Documents", text = "", fg = "#8250df" },
	{ name = "Downloads", text = "", fg = "#8250df" },
	{ name = "Library", text = "", fg = "#8250df" },
	{ name = "Movies", text = "", fg = "#8250df" },
	{ name = "Music", text = "", fg = "#8250df" },
	{ name = "Pictures", text = "", fg = "#8250df" },
	{ name = "Public", text = "", fg = "#8250df" },
	{ name = "Videos", text = "", fg = "#8250df" },
]
#files = [
#
#]
#exts = [
#
#]
conds = [
	# Fallback
	{ if = "dir & hovered", text = "", fg = "#8250df" },
	{ if = "dir", text = "", fg = "#8250df" },
	{ if = "exec", text = "", fg = "#0a3069" },
	{ if = "!dir", text = "", fg = "#32383f" },
]
