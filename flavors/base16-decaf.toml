[mgr]
cwd = { fg = "#bed6ff" }

find_keyword = { bold = true, fg = "#ffd67c" }
find_position = { fg = "#efb3f7" }

marker_copied = { fg = "#beda78", bg = "#beda78" }
marker_cut = { fg = "#ff7f7b", bg = "#ff7f7b" }
marker_selected = { fg = "#ffd67c", bg = "#ffd67c" }

count_copied = { fg = "#2d2d2d", bg = "#beda78" }
count_cut = { fg = "#2d2d2d", bg = "#ff7f7b" }
count_selected = { fg = "#2d2d2d", bg = "#ffd67c" }

border_style = { fg = "#90bee1" }

[tabs]
active = { fg = "#2d2d2d", bg = "#90bee1"}
inactive = { fg = "#90bee1", bg = "#393939" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }

[mode]
normal_main = { fg = "#2d2d2d", bg = "#90bee1", bold = true }
normal_alt = { fg = "#90bee1", bg = "#515151" }

select_alt = { fg = "#efb3f7", bg = "#515151" }
select_main = { fg = "#2d2d2d", bg = "#efb3f7", bold = true }

unset_main = { fg = "#2d2d2d", bg = "#ff7f7b", bold = true }
unset_alt = { fg = "#ff7f7b", bg = "#515151" }

[status]
perm_exec = { fg = "#beda78" }
perm_read = { fg = "#ffd67c" }
perm_sep = { fg = "#bed6ff" }
perm_type = { fg = "#90bee1" }
perm_write = { fg = "#ff7f7b" }

progress_error = { fg = "#ff7f7b", bg = "#2d2d2d" }
progress_label = { fg = "#cccccc", bg = "#2d2d2d" }
progress_normal = { fg = "#cccccc", bg = "#2d2d2d" }

[pick]
active = { fg = "#efb3f7" }
border = { fg = "#90bee1" }
inactive = { fg = "#cccccc" }

[task]
title = { fg = "#90bee1" }
border = { fg = "#90bee1" }
hovered = { fg = "#cccccc", bg = "#515151" }

[input]
border = { fg = "#90bee1" }
selected = { bg = "#515151" }

[help]
desc = { fg = "#cccccc" }
on = { fg = "#bed6ff" }
run = { fg = "#efb3f7" }
hovered = { reversed = true, bold = true }
footer = { fg = "#515151", bg = "#cccccc" }

[which]
mask = { bg = "#515151" }
desc = { fg = "#cccccc" }
cand = { fg = "#bed6ff" }
rest = { fg = "#ff93b3" }

separator_style = { fg = "#b4b7b4" }

[notify]
title_info = { fg = "#bed6ff" }
title_warn = { fg = "#ffd67c" }
title_error = { fg = "#ff7f7b" }
 
[filetype]
rules = [
  { mime = "image/*", fg = "#bed6ff" },
  { mime = "{audio, video}/*", fg = "#ffd67c" },
   
  { mime = "application/{pdf,doc,rtf}", fg = "#beda78" },
  
  { mime = "application/" },
  
  { url = "*/", fg = "#90bee1" },
  { mime = "*", fg = "#cccccc" },
]

[icon]
globs = []
dirs  = [
	{ name = ".config", text = "", fg = "#90bee1" },
	{ name = ".git", text = "", fg = "#90bee1" },
	{ name = ".github", text = "", fg = "#90bee1" },
	{ name = ".npm", text = "", fg = "#90bee1" },
	{ name = "Desktop", text = "", fg = "#90bee1" },
	{ name = "Development", text = "", fg = "#90bee1" },
	{ name = "Documents", text = "", fg = "#90bee1" },
	{ name = "Downloads", text = "", fg = "#90bee1" },
	{ name = "Library", text = "", fg = "#90bee1" },
	{ name = "Movies", text = "", fg = "#90bee1" },
	{ name = "Music", text = "", fg = "#90bee1" },
	{ name = "Pictures", text = "", fg = "#90bee1" },
	{ name = "Public", text = "", fg = "#90bee1" },
	{ name = "Videos", text = "", fg = "#90bee1" },
]
#files = [
#
#]
#exts = [
#
#]
conds = [
	# Fallback
	{ if = "dir & hovered", text = "", fg = "#90bee1" },
	{ if = "dir", text = "", fg = "#90bee1" },
	{ if = "exec", text = "", fg = "#beda78" },
	{ if = "!dir", text = "", fg = "#e0e0e0" },
]
