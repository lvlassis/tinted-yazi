[mgr]
cwd = { fg = "#12cfc0" }

find_keyword = { bold = true, fg = "#ddb26f" }
find_position = { fg = "#e1a3ee" }

marker_copied = { fg = "#acc267", bg = "#acc267" }
marker_cut = { fg = "#fb9fb1", bg = "#fb9fb1" }
marker_selected = { fg = "#ddb26f", bg = "#ddb26f" }

count_copied = { fg = "#151515", bg = "#acc267" }
count_cut = { fg = "#151515", bg = "#fb9fb1" }
count_selected = { fg = "#151515", bg = "#ddb26f" }

border_style = { fg = "#6fc2ef" }

[tabs]
active = { fg = "#151515", bg = "#6fc2ef"}
inactive = { fg = "#6fc2ef", bg = "#202020" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }

[mode]
normal_main = { fg = "#151515", bg = "#6fc2ef", bold = true }
normal_alt = { fg = "#6fc2ef", bg = "#303030" }

select_alt = { fg = "#e1a3ee", bg = "#303030" }
select_main = { fg = "#151515", bg = "#e1a3ee", bold = true }

unset_main = { fg = "#151515", bg = "#fb9fb1", bold = true }
unset_alt = { fg = "#fb9fb1", bg = "#303030" }

[status]
perm_exec = { fg = "#acc267" }
perm_read = { fg = "#ddb26f" }
perm_sep = { fg = "#12cfc0" }
perm_type = { fg = "#6fc2ef" }
perm_write = { fg = "#fb9fb1" }

progress_error = { fg = "#fb9fb1", bg = "#151515" }
progress_label = { fg = "#d0d0d0", bg = "#151515" }
progress_normal = { fg = "#d0d0d0", bg = "#151515" }

[pick]
active = { fg = "#e1a3ee" }
border = { fg = "#6fc2ef" }
inactive = { fg = "#d0d0d0" }

[task]
title = { fg = "#6fc2ef" }
border = { fg = "#6fc2ef" }
hovered = { fg = "#d0d0d0", bg = "#303030" }

[input]
border = { fg = "#6fc2ef" }
selected = { bg = "#303030" }

[help]
desc = { fg = "#d0d0d0" }
on = { fg = "#12cfc0" }
run = { fg = "#e1a3ee" }
hovered = { reversed = true, bold = true }
footer = { fg = "#303030", bg = "#d0d0d0" }

[which]
mask = { bg = "#303030" }
desc = { fg = "#d0d0d0" }
cand = { fg = "#12cfc0" }
rest = { fg = "#deaf8f" }

separator_style = { fg = "#b0b0b0" }

[notify]
title_info = { fg = "#12cfc0" }
title_warn = { fg = "#ddb26f" }
title_error = { fg = "#fb9fb1" }
 
[filetype]
rules = [
  { mime = "image/*", fg = "#12cfc0" },
  { mime = "{audio, video}/*", fg = "#ddb26f" },
   
  { mime = "application/{pdf,doc,rtf}", fg = "#acc267" },
  
  { mime = "application/" },
  
  { url = "*/", fg = "#6fc2ef" },
  { mime = "*", fg = "#d0d0d0" },
]

[icon]
globs = []
dirs  = [
	{ name = ".config", text = "", fg = "#6fc2ef" },
	{ name = ".git", text = "", fg = "#6fc2ef" },
	{ name = ".github", text = "", fg = "#6fc2ef" },
	{ name = ".npm", text = "", fg = "#6fc2ef" },
	{ name = "Desktop", text = "", fg = "#6fc2ef" },
	{ name = "Development", text = "", fg = "#6fc2ef" },
	{ name = "Documents", text = "", fg = "#6fc2ef" },
	{ name = "Downloads", text = "", fg = "#6fc2ef" },
	{ name = "Library", text = "", fg = "#6fc2ef" },
	{ name = "Movies", text = "", fg = "#6fc2ef" },
	{ name = "Music", text = "", fg = "#6fc2ef" },
	{ name = "Pictures", text = "", fg = "#6fc2ef" },
	{ name = "Public", text = "", fg = "#6fc2ef" },
	{ name = "Videos", text = "", fg = "#6fc2ef" },
]
#files = [
#
#]
#exts = [
#
#]
conds = [
	# Fallback
	{ if = "dir & hovered", text = "", fg = "#6fc2ef" },
	{ if = "dir", text = "", fg = "#6fc2ef" },
	{ if = "exec", text = "", fg = "#acc267" },
	{ if = "!dir", text = "", fg = "#e0e0e0" },
]
